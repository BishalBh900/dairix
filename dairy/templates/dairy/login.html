{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Dairix</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --green: #2e7d32;
  --green-light: #e8f5e9;
  --black: #111;
  --gray: #777;
  --border: #ddd;
  --white: #fff;
  --red: #e53935;
  --red-bg: #fdecea;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--green-light);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  position: relative;
}

/* BRAND */
.brand {
  position: absolute;
  top: 20px;
  left: 30px;
  font-size: 22px;
  font-weight: 600;
}

.brand-main { color: var(--red); }

.brand-sub {
  display: block;
  font-size: 12px;
  font-weight: 400;
  color: var(--black);
  margin-top: 2px;
}

/* LOGIN BOX */
.container {
  background: var(--white);
  padding: 40px;
  width: 100%;
  max-width: 420px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

h1 {
  font-size: 26px;
  color: var(--black);
  margin-bottom: 6px;
}

.sub {
  font-size: 14px;
  color: var(--gray);
  margin-bottom: 24px;
}

.input-group {
  margin-bottom: 16px;
}

input {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  outline: none;
}

input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(46,125,50,0.1);
}

button {
  width: 100%;
  padding: 12px;
  background: var(--green);
  color: var(--white);
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
}

button:hover {
  background: #256b2a;
}

/* GOOGLE BUTTON */
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  text-decoration: none;
  color: #111;
  font-size: 14px;
  font-weight: 500;
  background: #fff;
  transition: 0.2s;
}

.google-btn:hover {
  background: #f5f5f5;
}

.alert {
  background: var(--red-bg);
  color: #c62828;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}

.footer {
  text-align: center;
  margin-top: 18px;
  font-size: 14px;
  color: var(--gray);
}

.footer a {
  color: var(--green);
  text-decoration: none;
  font-weight: 500;
}
</style>
</head>

<body>

<!-- BRAND -->
<div class="brand">
  <span class="brand-main">Dairix</span>
  <span class="brand-sub">Dairy Management System</span>
</div>

<!-- LOGIN BOX -->
<div class="container">

  <h1>Welcome back</h1>
  <p class="sub">Sign in to continue</p>

  {% if messages %}
    {% for msg in messages %}
      <div class="alert">{{ msg }}</div>
    {% endfor %}
  {% endif %}

  <!-- LOGIN FORM -->
  <form method="post">
    {% csrf_token %}

    <div class="input-group">
      <input type="email" name="username" placeholder="yourname@gmail.com" />
    </div>

    <div class="input-group">
      <input type="password" name="password" placeholder="Password" required>
    </div>

    <button type="submit">Sign In</button>
  </form>

  <!-- GOOGLE LOGIN -->
  <div style="text-align:center; margin:16px 0; color:#777;">
    — or —
  </div>

  <a href="{% provider_login_url 'google' %}" class="google-btn">
    <img src="https://www.svgrepo.com/show/355037/google.svg" width="18" height="18">
    Sign in with Google
  </a>

  <!-- SIGNUP LINK -->
  <div class="footer">
    Don't have an account? <a href="{% url 'signup' %}">Sign up</a>
  </div>

</div>

</body>
</html>
