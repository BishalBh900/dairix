{% extends "dairy/base.html" %}
{% block title %}Add Farmer — DairyMS{% endblock %}
{% block page_title %}Add Farmer{% endblock %}

{% block content %}

<div style="max-width:540px;">
  <div class="card">
    <div class="card-header">
      <div class="card-title">New Farmer Registration</div>
      <a href="{% url 'farmers' %}" class="btn btn-outline" style="padding:6px 12px;font-size:12px;">← Back</a>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="e.g. Ramesh Sharma" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" placeholder="+977 98XXXXXXXX" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="gmail" placeholder="farmer@gmail.com" />
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" placeholder="Village, District" />
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button type="submit" class="btn btn-primary" style="flex:1;">Register Farmer</button>
        <a href="{% url 'farmers' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
